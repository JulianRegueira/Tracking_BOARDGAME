<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#141019" />
  <title>Tracker de Comandante</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero-card">
      <div class="top-bar">
        <div>
          <p class="eyebrow">Juego de Mesa</p>
          <h1>Tracker de Comandante</h1>
        </div>
        <button class="ghost-button" id="resetAllBtn" type="button" aria-label="Reiniciar todo">↺</button>
      </div>

      <label class="name-label" for="playerName">Nombre del jugador</label>
      <input id="playerName" class="name-input" maxlength="24" placeholder="Escribe tu nombre" autocomplete="off" />

      <div class="vital-orb" aria-live="polite">
        <span class="orb-label">VIDA</span>
        <strong id="lifeValue">30</strong>
      </div>

      <div class="main-controls" aria-label="Controles de vida">
        <button type="button" data-target="life" data-delta="-5">-5</button>
        <button type="button" data-target="life" data-delta="-1">-1</button>
        <button type="button" data-target="life" data-delta="1">+1</button>
        <button type="button" data-target="life" data-delta="5">+5</button>
      </div>
    </section>

    <section class="stat-grid">
      <article class="stat-card attack-card">
        <div class="stat-header">
          <span>ATAQUE</span>
          <button type="button" class="small-reset" data-reset="attack">Reset</button>
        </div>
        <strong id="attackValue">0</strong>
        <div class="stepper">
          <button type="button" data-target="attack" data-delta="-1">−</button>
          <button type="button" data-target="attack" data-delta="1">+</button>
        </div>
      </article>

      <article class="stat-card defense-card">
        <div class="stat-header">
          <span>DEFENSA</span>
          <button type="button" class="small-reset" data-reset="defense">Reset</button>
        </div>
        <strong id="defenseValue">0</strong>
        <div class="stepper">
          <button type="button" data-target="defense" data-delta="-1">−</button>
          <button type="button" data-target="defense" data-delta="1">+</button>
        </div>
      </article>
    </section>

    <section class="quick-actions">
      <button type="button" id="resetCombatBtn">Resetear ATQ/DEF</button>
      <button type="button" id="newGameBtn">Nueva partida</button>
    </section>

    <footer>
      <span>Guardado automático en este celular</span>
    </footer>
  </main>

  <dialog id="confirmDialog">
    <form method="dialog">
      <h2>Nueva partida</h2>
      <p>Esto reinicia vida, ataque y defensa. El nombre del jugador se mantiene.</p>
      <div class="dialog-actions">
        <button value="cancel" type="submit">Cancelar</button>
        <button value="confirm" class="danger" type="submit">Reiniciar</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
